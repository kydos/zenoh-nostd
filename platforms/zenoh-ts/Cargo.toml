[package]
name = "zenoh-ts-wasm"
version = "0.1.0"
edition = "2024"
authors = []
categories = ["network-programming"]
description = "zenoh-nostd WASM TypeScript bindings — native Zenoh v9 protocol"
homepage = "http://zenoh.io"
license = "EPL-2.0 OR Apache-2.0"
repository = "https://github.com/eclipse-zenoh/zenoh-nostd"

[lib]
crate-type = ["cdylib"]

[features]
web_console = ["zenoh-nostd/web_console", "web-sys"]

[dependencies]
zenoh-nostd = { version = "0.1.0", path = "../../crates/zenoh-nostd", default-features = false, features = [
    "alloc",
    "web_console",
] }
zenoh-wasm = { version = "0.1.0", path = "../zenoh-wasm" }
zenoh-proto = { version = "0.1.0", path = "../../crates/zenoh-proto" }

wasm-bindgen = "0.2"
js-sys = "0.3"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = ["console"], optional = true }

embassy-time = { version = "0.5", features = ["wasm", "generic-queue-8"] }
embassy-sync = "0.7"
embassy-futures = "0.1"

getrandom = { version = "0.2.16", features = ["js"] }
