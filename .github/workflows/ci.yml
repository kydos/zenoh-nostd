name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Clone this repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy & build
    runs-on: ubuntu-latest
    steps:
      - name: Clone this repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Setup rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Clippy — zenoh-nostd feature matrix
        run: |
          cargo clippy -p zenoh-nostd -- -D warnings
          cargo clippy -p zenoh-nostd --features=log -- -D warnings
          cargo clippy -p zenoh-nostd --features=defmt -- -D warnings
          cargo clippy -p zenoh-nostd --features=web_console -- -D warnings
          cargo clippy -p zenoh-nostd --features=alloc -- -D warnings

      - name: Clippy — examples (std + wasm)
        run: |
          cargo clippy --examples --features=std,log -- -D warnings
          cargo clippy --examples --features=std,log,alloc -- -D warnings
          cargo clippy --target wasm32-unknown-unknown --examples --no-default-features --features=wasm,web_console -- -D warnings
          cargo clippy --target wasm32-unknown-unknown --examples --no-default-features --features=wasm,web_console,alloc -- -D warnings

      - name: Clippy — zenoh-std platform
        working-directory: platforms/zenoh-std
        run: |
          cargo clippy -- -D warnings
          cargo clippy --features=zenoh-nostd/log -- -D warnings

      - name: Clippy — zenoh-wasm platform
        working-directory: platforms/zenoh-wasm
        run: |
          cargo clippy --target wasm32-unknown-unknown -- -D warnings
          cargo clippy --features=zenoh-nostd/web_console --target wasm32-unknown-unknown -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Clone this repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Run tests
        run: cargo test -p zenoh-proto -p zenoh-sansio

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Clone this repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Setup rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Generate coverage (lcov)
        run: cargo llvm-cov -p zenoh-proto -p zenoh-sansio --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # NOTE: In GitHub repository settings, the "Require status checks to pass
  # before merging" branch protection rule ensures that commits are only merged
  # from branches where specific status checks have passed. These checks are
  # specified manually as a list of workflow job names. Thus we use this extra
  # job to signal whether all CI checks have passed.
  ci:
    name: CI status checks
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, coverage]
    if: always()
    steps:
      - name: Check whether all jobs pass
        run: echo '${{ toJson(needs) }}' | jq -e 'all(.result == "success")'
